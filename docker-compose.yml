services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong@Passw0rd}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  smtp4dev:
    image: rnwood/smtp4dev:v3
    ports:
      - "5000:80"
      - "2525:25"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=PruebaTekus;User Id=sa;Password=${MSSQL_SA_PASSWORD:-YourStrong@Passw0rd};TrustServerCertificate=True;"
      Smtp__Host: smtp4dev
      Smtp__Port: "25"
      Smtp__From: "noreply@pruebatekus.local"
      Smtp__UseSsl: "false"
      Notifications__NewServiceNotificationEmail: "reviewer@pruebatekus.local"
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      smtp4dev:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  sqlserver-data:
