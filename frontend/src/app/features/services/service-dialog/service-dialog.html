<h2 mat-dialog-title>{{ title() }}</h2>
<p class="subtitle">for {{ data.providerName }}</p>

<form [formGroup]="form" (ngSubmit)="save()">
  <div mat-dialog-content class="content">
    <mat-form-field appearance="outline" class="field">
      <mat-label>Service name</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="field">
      <mat-label>Value per hour (USD)</mat-label>
      <span matTextPrefix>$&nbsp;</span>
      <input matInput type="number" min="0" formControlName="hourlyRate" />
    </mat-form-field>

    <div class="info-banner">
      <mat-icon>mail</mat-icon>
      <span>On save, a notification email is sent to the system-configured address announcing this new service.</span>
    </div>
  </div>

  <div mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="saving()">Save service</button>
  </div>
</form>
