<div class="login-page">
  <div class="login-card">
    <img class="logo" src="branding/tekus-logo.png" alt="TEKUS" />
    <h1>TEKUS Admin</h1>
    <p class="tagline">Service Provider Management</p>

    <mat-form-field appearance="outline" class="field">
      <mat-label>Email</mat-label>
      <input matInput [value]="email" readonly />
    </mat-form-field>

    <mat-form-field appearance="outline" class="field">
      <mat-label>Password</mat-label>
      <input matInput type="password" [value]="password" readonly />
    </mat-form-field>

    <button mat-flat-button color="primary" class="sign-in" type="button" (click)="signIn()">Sign in</button>
  </div>
</div>
